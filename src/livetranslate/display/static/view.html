<!doctype html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>livetranslate — {{LANG}}</title>
<style>
  :root { --fg:#e8e8e8; --bg:#111; --dim:#888; }
  body.light { --fg:#111; --bg:#fafafa; --dim:#777; }
  body { background:var(--bg); color:var(--fg); margin:0;
         font:calc(1rem * {{FONT_SCALE}})/1.55 Georgia, "Noto Serif", serif;
         overflow-anchor: auto; }
  #text { max-width: 60rem; margin: 0 auto; padding: 1.5rem 1.5rem 40vh; }
  /* one sentence per line, like the operator console */
  p.s { margin: 0 0 .55em; }
  p.s.pbreak { margin-top: 1.6em; }
  /* draft = Speechmatics realtime translation, shown until the LLM caption lands */
  p.s.draft { font-style: italic; color: var(--dim);
              animation: draftfade .4s ease-in; }
  @keyframes draftfade { from { opacity: 0; } to { opacity: 1; } }
  #activity { position: fixed; bottom: .5rem; inset-inline-start: 1rem; color: var(--dim); }
  #toggle { position: fixed; top: .5rem; inset-inline-end: .5rem;
            background:none; border:1px solid var(--dim); color:var(--dim);
            border-radius: 4px; cursor: pointer; padding: .25rem .5rem; }
  #jump { position: fixed; bottom: .75rem; inset-inline-end: .75rem; display: none;
          background: var(--bg); color: var(--fg); border: 1px solid var(--dim);
          border-radius: 999px; padding: .4rem .9rem; cursor: pointer; font: inherit; }
</style>
</head>
<body>
<button id="toggle" aria-label="toggle theme">&#9728; / &#9790;</button>
<div id="text"></div>
<span id="activity" hidden>&#8230;</span>
<button id="jump">&#8595; live</button>
<script>
const lang = "{{LANG}}";
document.getElementById("toggle").onclick = () => document.body.classList.toggle("light");
const textEl = document.getElementById("text");
const jumpBtn = document.getElementById("jump");

// Follow the live edge only while the reader is already at it. If they have
// scrolled up to read, never move their viewport — new sentences append below
// without shifting (overflow-anchor keeps the position pinned). A "live"
// button appears so they can jump back down when ready.
const NEAR_BOTTOM_PX = 140;
function atBottom() {
  return window.innerHeight + window.scrollY >= document.body.scrollHeight - NEAR_BOTTOM_PX;
}
function maybeFollow() {
  if (atBottom()) {
    scrollTo(0, document.body.scrollHeight);
    jumpBtn.style.display = "none";
  } else {
    jumpBtn.style.display = "block";
  }
}
jumpBtn.onclick = () => { scrollTo(0, document.body.scrollHeight); jumpBtn.style.display = "none"; };
addEventListener("scroll", () => { if (atBottom()) jumpBtn.style.display = "none"; });

const es = new EventSource(`/events?lang=${lang}`);
// The draft line is a single provisional <p> pinned at the bottom. Real
// translations append ABOVE it as regular text; the draft updates in place as
// new partials arrive, and is removed when empty. This yields "italic draft
// that becomes regular text once the authoritative translation arrives".
let draftEl = null;
function removeDraft() {
  if (draftEl) { draftEl.remove(); draftEl = null; }
}
es.onmessage = (m) => {
  const ev = JSON.parse(m.data);
  if (ev.type === "translation" || ev.type === "sentence") {
    const wasAtBottom = atBottom();
    // Insert the finalized line before the draft so the draft stays at the edge.
    const p = document.createElement("p");
    p.className = "s" + (ev.paragraph_break && textEl.childElementCount ? " pbreak" : "");
    p.textContent = ev.text;
    textEl.insertBefore(p, draftEl);   // draftEl null -> appends at end
    if (wasAtBottom) scrollTo(0, document.body.scrollHeight); else maybeFollow();
  } else if (ev.type === "draft") {
    const wasAtBottom = atBottom();
    if (!ev.text) {
      removeDraft();
      if (wasAtBottom) scrollTo(0, document.body.scrollHeight);
      return;
    }
    if (!draftEl) {
      draftEl = document.createElement("p");
      draftEl.className = "s draft";
      textEl.appendChild(draftEl);
    }
    draftEl.textContent = ev.text;
    if (wasAtBottom) scrollTo(0, document.body.scrollHeight);
  } else if (ev.type === "tail") {
    document.getElementById("activity").hidden = !ev.text;
  }
};
</script>
</body>
</html>
