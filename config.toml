[session]
source_language = "en"          # pinned per session; "de" supported
output_dir = "sessions"

[audio]
device_substring = "Scarlett"   # refuse to start if not found
chunk_ms = 100
ring_seconds = 120

[asr]
adapter = "speechmatics"        # "elevenlabs" | "assemblyai" | "speechmatics"
failover = "elevenlabs"         # cross-vendor fallback when the primary stays down
# Seconds the primary may keep failing to reconnect before we switch to `failover`.
# 0 = never fail over (retry the primary forever). Failover is a ONE-WAY switch for
# the rest of the session, so keep this patient enough to ride out a transient blip
# (Speechmatics reconnect backoff gets ~6-7 attempts in 30s) but short enough that a
# truly-dead primary doesn't blank captions for long. The ring (120s) covers the gap.
give_up_after_s = 30            # 0 = never
overlap_ms = 2000
# Proactively rotate the ASR WebSocket after this many seconds (0 = off). Speechmatics'
# max session duration is undocumented (docs/vendor-notes.md), so rotate at 4 h as a safety
# margin for long events. Note: if failover to ElevenLabs is active, its ~90 min cap (and
# AssemblyAI's ~3 h) is hit first — ResilientASR reconnects automatically on the vendor limit.
max_session_s = 14400          # 4 hours

[asr.elevenlabs]
# endpoint/model fields filled in after doc verification (§13)
# realtime cap is 50 per docs/vendor-notes.md (Task 8); surcharged
keyterms_max = 50

[asr.assemblyai]
use_domain_prompt = true

[asr.speechmatics]
# additional_vocab has a latency/memory penalty for large lists (docs/vendor-notes.md).
additional_vocab_max = 50
# max_delay (seconds): lower = faster partials but more revisions. 1.0 is a good default.
max_delay = 1.0

[segmenter]
max_words = 45
max_pending_s = 12

[translate]
targets = ["es", "fr", "de", "pt"]   # add "ar", "zh" to enable
provider = "openai_chat"              # DeepSeek is OpenAI-compatible
base_url = "https://api.deepseek.com"
model = "deepseek-v4-flash"
api_key_env = "TRANSLATE_API_KEY"
timeout_s = 20                        # DeepSeek can be slow under load; 10s caused 2 timeouts in test run
batch_threshold = 3
batch_max = 6
# [translate.fallback] optional second provider block

[glossary]
path = "glossary.tsv"
domain_blurb = "domain_blurb.txt"

[display]
host = "0.0.0.0"
port = 8765                     # 8080 is occupied by another app on this machine
font_scale = 1.4
# Show Speechmatics realtime translation as an instant italic draft caption,
# replaced by the glossary-accurate LLM translation when it lands. Requires
# adapter = "speechmatics". No effect with other adapters.
draft_translation = false

[health]
stall_s = 10

[harness]
rtf = 1.0
